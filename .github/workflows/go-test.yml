name: Go tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build and test on ${{ matrix.os }} ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            runner: ubuntu-24.04
          - os: linux
            arch: arm64
            runner: ubuntu-24.04-arm
          - os: darwin
            arch: amd64
            runner: macos-15-intel
          - os: darwin
            arch: arm64
            runner: macos-15
      fail-fast: false

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install libclang for generator
        run: |
          if [ "${{ matrix.os }}" = "linux" ]; then
            sudo apt-get update
            sudo apt-get install -y libclang-20-dev llvm-20-dev
            # Link libclang-20 but do NOT add its include path. bootstrap
            # vendors its own clang-c headers (via -I${SRCDIR}) where the
            # pre-Clang-18 CXCursor_OMPArraySectionExpr still exists. Adding
            # the system clang-20 headers shadows the vendored copy and drops
            # that symbol, breaking the cgo compile. Enum values are stable,
            # so the vendored headers link cleanly against libclang-20.
            {
              echo "CGO_LDFLAGS=-L/usr/lib/llvm-20/lib"
              echo "LD_LIBRARY_PATH=/usr/lib/llvm-20/lib:$LD_LIBRARY_PATH"
            } >> "$GITHUB_ENV"
          elif [ "${{ matrix.os }}" = "darwin" ]; then
            # On macOS, use LLVM 20 to match Linux environment
            if ! LLVM_PREFIX=$(brew --prefix llvm@20 2>/dev/null) || [ ! -d "$LLVM_PREFIX" ]; then
              brew_log=$(mktemp)
              if ! brew install llvm@20 >"$brew_log" 2>&1; then
                cat "$brew_log"
                rm -f "$brew_log"
                exit 1
              fi
              rm -f "$brew_log"
              LLVM_PREFIX=$(brew --prefix llvm@20)
            fi
            # Link libclang-20 only; omit its include path so bootstrap's
            # vendored clang-c headers are used (see the Linux note above).
            {
              echo "CGO_LDFLAGS=-L${LLVM_PREFIX}/lib"
              echo "PATH=${LLVM_PREFIX}/bin:$PATH"
              echo "DYLD_LIBRARY_PATH=${LLVM_PREFIX}/lib:$DYLD_LIBRARY_PATH"
            } >> "$GITHUB_ENV"
          fi

      - name: Download FFmpeg libraries
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: go run ./cmd/download-lib/

      - name: Build
        run: go build -v .

      # Note: macOS may show linker warnings about version mismatches if the static
      # libraries were built on a newer macOS version than the runner.
      # These warnings are harmless - the libraries have MACOSX_DEPLOYMENT_TARGET=13.0
      - name: Test
        run: go test -v . ./av/...

      # Race detector on one leg. The global callback registries and cgo
      # bridges are platform-independent, so one platform suffices.
      - name: Test (race)
        if: matrix.os == 'linux' && matrix.arch == 'amd64'
        run: go test -race -count=1 . ./av/...

      # Lint on one leg. Scoped to . and ./av/... so the libclang-dependent
      # generator package is never compiled by the linter (that broke CI before).
      - name: Lint
        if: matrix.os == 'linux' && matrix.arch == 'amd64'
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          args: . ./av/...

      # The generator creates Go bindings from FFmpeg headers using libclang.
      # It's only needed during development when FFmpeg is updated.
      # bootstrap compiles against its vendored clang-c headers and links
      # libclang-20; see the include-path note in the install step above.
      - name: Run generator (optional - for development only)
        run: |
          echo "::notice::Generator compiles against bootstrap's vendored clang-c headers, linked against libclang-20"
          echo "Running generator with environment:"
          echo "CGO_LDFLAGS=$CGO_LDFLAGS"
          go run ./internal/generator 2>&1 | grep -v "cgo-gcc-prolog\|deprecated" || true
        continue-on-error: true

      - name: Check for generated code differences
        run: |
          if ! git diff --quiet -- ./*.gen.go; then
            echo "::notice title=Generated Code Diff on ${{ matrix.os }}/${{ matrix.arch }}::Generated bindings differ from committed version. This may be platform-specific behavior."
            git diff -- ./*.gen.go > /tmp/generator-diff.txt
            echo "::group::Generator Diff"
            cat /tmp/generator-diff.txt
            echo "::endgroup::"
          else
            echo "::notice title=Generated Code Match on ${{ matrix.os }}/${{ matrix.arch }}::Generated bindings match committed version."
          fi
        continue-on-error: true
