name: Go module release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Go module version (e.g., 8.0.0.1)"
        required: true
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*.[0-9]*"

permissions:
  contents: write

jobs:
  release:
    name: Create Go module release
    runs-on: ubuntu-24.04

    steps:
      - name: Validate version format
        if: github.event_name == 'workflow_dispatch'
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: Version must be in format X.Y.Z.N (e.g., 8.0.0.1)"
            exit 1
          fi

      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download FFmpeg libraries
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: go run ./cmd/download-lib/

      # Scoped to exclude internal/generator: it depends on libclang via
      # Newbluecake/bootstrap, which references CXCursor_OMPArraySectionExpr,
      # a cursor-kind symbol removed in Clang 18+. The generator is a
      # development-only tool that consumers never compile, so the module
      # release skips it. go-test.yml scopes its build/test/lint the same way.
      - name: Verify module builds
        run: go list ./... | grep -v '/internal/generator$' | xargs -r go build -v

      - name: Run tests
        run: go list ./... | grep -v '/internal/generator$' | xargs -r go test -v

      - name: Create tag (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Go modules require v prefix for version tags
          git tag -a "v$VERSION" -m "Release $VERSION"
          git push origin "v$VERSION"

      - name: Determine version
        id: version
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=v$VERSION" >> "$GITHUB_OUTPUT"
            echo "display_version=$VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
            echo "display_version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate changelog
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Get previous tag (look for v8.* tags)
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$' || echo "")

          if [ -n "$PREV_TAG" ]; then
            echo "Generating changelog from $PREV_TAG to $VERSION"
            COMMITS=$(git log --pretty=format:"- %s (%h)" "$PREV_TAG"..HEAD --no-merges)
          else
            echo "No previous version tag found, using recent commits"
            COMMITS=$(git log --pretty=format:"- %s (%h)" -20 --no-merges)
          fi

          # Write changelog to file (handles multiline)
          {
            echo "## What's Changed"
            echo ""
            echo "$COMMITS"
            echo ""
            echo "## Installation"
            echo ""
            echo "Static libraries (~100MB) are too large for \`go get\`; install via git submodule and a replace directive:"
            echo ""
            echo '```bash'
            echo 'git submodule add https://github.com/linuxmatters/ffmpeg-statigo third_party/ffmpeg-statigo'
            echo "(cd third_party/ffmpeg-statigo && git checkout $VERSION)"
            echo 'go mod edit -replace github.com/linuxmatters/ffmpeg-statigo=./third_party/ffmpeg-statigo'
            echo '(cd third_party/ffmpeg-statigo && go run ./cmd/download-lib)'
            echo '```'
            echo ""
            echo "See the [Installation guide](https://github.com/linuxmatters/ffmpeg-statigo#installation) for the full setup, including git fast-forward config."
            echo ""
            echo "**Full Changelog**: https://github.com/linuxmatters/ffmpeg-statigo/compare/${PREV_TAG:-main}...$VERSION"
          } > changelog.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.display_version }}
          body_path: changelog.md
          draft: false
          prerelease: false
